version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: huixiang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: huixiang_life
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/huixiang_life.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00

  redis:
    image: redis:7-alpine
    container_name: huixiang-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456 --appendonly yes
    volumes:
      - redis_data:/data

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: huixiang-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami

  kafka:
    image: bitnami/kafka:3.6
    container_name: huixiang-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_NUM_PARTITIONS: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami

  canal:
    image: canal/canal-server:v1.1.5
    container_name: huixiang-canal
    restart: unless-stopped
    depends_on:
      - mysql
      - kafka
    ports:
      - "11111:11111"
      - "11112:11112"
    environment:
      CANAL_IP: canal
      CANAL_PORT: 11111
      CANAL_DESTINATION: example
      CANAL_SERVER_MODE: tcp
      CANAL_IP_MYSQL: mysql
      CANAL_PORT_MYSQL: 3306
      MYSQL_ROOT_PASSWORD: 123456
      CANAL_FILTER_REGEX: huixiang_life\\..*
      TZ: Asia/Shanghai

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  kafka_data:
