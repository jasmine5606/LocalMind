server:
  port: 8081
spring:
  application:
    name: hui-xiang-life
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/huixiang_life?useSSL=false&serverTimezone=UTC
    username: root
    password: 123
  redis:
    host: 192.168.150.101
    port: 6379
    password: 123321
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.huixiang.entity # 别名扫描包
logging:
  level:
    com.huixiang: debug
  pattern:
    dateformat: mm:ss.SSS

kafka:
  dlq:
    topic: canal-events-dlq

dingtalk:
  webhook: https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN